apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-git
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitops-git
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitops-git
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: git-daemon
          image: alpine:3.23.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -lc
            - |
              apk add --no-cache git-daemon
              exec git daemon \
                --verbose \
                --export-all \
                --reuseaddr \
                --listen=0.0.0.0 \
                --port=9418 \
                --base-path=/srv/git \
                /srv/git
          ports:
            - containerPort: 9418
              name: git
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: repo
              mountPath: /srv/git/gitops.git
              readOnly: true
      volumes:
        - name: repo
          hostPath:
            path: /root/gitops.git
            type: Directory
