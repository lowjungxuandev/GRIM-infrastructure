apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitops-http
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitops-http
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.29.8-alpine3.23
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: repo
              mountPath: /usr/share/nginx/html/gitops.git
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: repo
          hostPath:
            path: /root/gitops.git
            type: Directory
        - name: nginx-conf
          configMap:
            name: gitops-repo-nginx
