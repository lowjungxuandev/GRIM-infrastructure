apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitops-http
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitops-http
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27.5-alpine
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: repo
              mountPath: /usr/share/nginx/html/gitops.git
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: repo
          hostPath:
            path: /root/gitops.git
            type: Directory
        - name: nginx-conf
          configMap:
            name: gitops-repo-nginx
