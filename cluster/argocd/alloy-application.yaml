apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  labels:
    app.kubernetes.io/name: alloy
spec:
  project: default
  source:
    repoURL: git://gitops-git.argocd.svc.cluster.local/gitops.git
    targetRevision: main
    path: apps/alloy/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: alloy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
