apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alloy
  namespace: alloy
  annotations:
    nginx.ingress.kubernetes.io/auth-realm: "Alloy Authentication Required"
    nginx.ingress.kubernetes.io/auth-secret: alloy-basic-auth
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: lowjungxuan.dpdns.org
      http:
        paths:
          - path: /alloy
            pathType: Prefix
            backend:
              service:
                name: alloy
                port:
                  number: 80
