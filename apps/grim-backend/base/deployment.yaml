apiVersion: apps/v1
kind: Deployment
metadata:
  name: grim-backend
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: grim-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grim-backend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/lowjungxuandev/grim/backend:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - secretRef:
                name: grim-backend-env
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
