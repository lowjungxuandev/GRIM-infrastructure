apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: grim-kubernetes
        orgId: 1
        folder: GRIM
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
