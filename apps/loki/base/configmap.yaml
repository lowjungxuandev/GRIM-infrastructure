apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: loki
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules

    analytics:
      reporting_enabled: false

    ui:
      enabled: true

    schema_config:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    limits_config:
      allow_structured_metadata: true
      ingestion_burst_size_mb: 16
      ingestion_rate_mb: 8
      retention_period: 168h
      volume_enabled: true

    compactor:
      delete_request_store: filesystem
      retention_enabled: true
      working_directory: /loki/compactor

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    ruler:
      rule_path: /loki/rules-temp
      storage:
        type: local
        local:
          directory: /loki/rules
